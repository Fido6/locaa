[custom]
; 个人定制化 subconverter 配置文件 - 本地数据库+自动测速版
; 尽可能使用本地 geosite、geoip 数据库

; 1. 建立符合你需求的策略组
; 节点选择：包含自动选择、直连、拦截，以及使用正则 .* 匹配出的所有自定义节点
custom_proxy_group=🚀 节点选择`select`[]自动选择`[]DIRECT`[]REJECT`.*
; 自动选择：每 300 秒测速一次，使用谷歌 Android 测速链接
custom_proxy_group=自动选择`url-test`.*`https://client1.android.com/generate_204`300,,50
; 代理和直连组
custom_proxy_group=✨ 代理`select`[]🚀 节点选择`[]自动选择`[]DIRECT
custom_proxy_group=🎯 直连`select`[]DIRECT`[]🚀 节点选择

; 2. 编写规则（使用 [] 声明本地规则）
; 屏蔽广告与特定恶意网段
ruleset=🛑 屏蔽连接,[]GEOSITE,category-ads-all
ruleset=🛑 屏蔽连接,[]IP-CIDR,203.195.121.0/24

; 代理规则 (Google)
ruleset=✨ 代理,[]GEOSITE,google
ruleset=✨ 代理,[]GEOIP,google

; 直连规则 (CN)
ruleset=🎯 直连,[]GEOSITE,cn
ruleset=🎯 直连,[]GEOIP,cn

; 最终兜底：漏网之鱼流向节点选择
ruleset=🚀 节点选择,[]FINAL

; 开启规则生成
enable_rule_generator=true
overwrite_original_rules=true
